name: Build XC-Clean OnlyOffice (Dameng)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # 依然白嫖原生 ARM
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export to Tar
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.xc   # 👉 关键：指向刚才建的净化版 Dockerfile
          tags: onlyoffice-xc:arm64
          outputs: type=docker,dest=/tmp/onlyoffice-xc-arm64.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlyoffice-xc-package
          path: /tmp/onlyoffice-xc-arm64.tar
          retention-days: 1
